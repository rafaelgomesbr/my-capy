<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#3B6FD4"/>
  <!-- Ears -->
  <ellipse cx="9.5" cy="9" rx="4.5" ry="4" fill="#8B5E3C"/>
  <ellipse cx="22.5" cy="9" rx="4.5" ry="4" fill="#8B5E3C"/>
  <!-- Head -->
  <ellipse cx="16" cy="18" rx="11" ry="10" fill="#9B6B45"/>
  <!-- Inner ears -->
  <ellipse cx="9.5" cy="9" rx="2.8" ry="2.4" fill="#C4855A"/>
  <ellipse cx="22.5" cy="9" rx="2.8" ry="2.4" fill="#C4855A"/>
  <!-- Eyes -->
  <circle cx="12" cy="16" r="2.2" fill="#1A0A00"/>
  <circle cx="20" cy="16" r="2.2" fill="#1A0A00"/>
  <!-- Eye shine -->
  <circle cx="12.9" cy="15.1" r="0.7" fill="white"/>
  <circle cx="20.9" cy="15.1" r="0.7" fill="white"/>
  <!-- Wide muzzle - traço característico da capivara -->
  <rect x="10" y="20" width="12" height="6" rx="3" fill="#7A4E2D"/>
  <!-- Nostrils -->
  <circle cx="13.5" cy="23" r="1.3" fill="#3D2210"/>
  <circle cx="18.5" cy="23" r="1.3" fill="#3D2210"/>
</svg>
